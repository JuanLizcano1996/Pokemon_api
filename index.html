<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokedex Kanto</title>

<link rel="stylesheet" href="pokeNav.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

</head>

<body>

<header>
<h1>Pokedex Kanto</h1>
</header>


<div class="layout">

<div class="mapa">
<img src="Mapa_de_Kanto_señalizado_RFVH.png"><img>
<audio id="musicaKanto" loop>
<source src="1-10. Pokémon Center.mp3" type="audio/mpeg">
</audio>

<button id="botonMusica">Play</button>
</div>

<div class="controles">

<div class="filtros">

<button onclick="mostrarTipo('all')">Todos</button>
<button onclick="mostrarTipo('fire')">Fuego</button>
<button onclick="mostrarTipo('water')">Agua</button>
<button onclick="mostrarTipo('grass')">Planta</button>
<button onclick="mostrarTipo('electric')">Eléctrico</button>
<button onclick="mostrarTipo('psychic')">Psíquico</button>
<button onclick="mostrarTipo('rock')">Roca</button>
<button onclick="mostrarTipo('ground')">Tierra</button>
<button onclick="mostrarTipo('poison')">Veneno</button>

</div>

<div class="pokedex" id="lista"></div>
<div id="modalPokemon" class="modal">

  <div class="modal-contenido">

    <span id="cerrarModal">✖</span>

    <h2 id="nombrePokemon"></h2>

    <img id="imagenPokemon">

    <p id="tiposPokemon"></p>

    <div id="statsPokemon"></div>

  </div>

</div>
</div>

</div>

<script src="pokeNav.js"></script>

</body>
</html>
